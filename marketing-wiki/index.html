<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Casita Miro Marketing POC - Strategic documentation hub for brand, marketing, and positioning strategy.">
    <title>Casita Miro Marketing POC</title>
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/marketing-bible.css">
    
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    
    <!-- Configure marked options -->
    <script>
        marked.setOptions({
            breaks: true,
            gfm: true,
            headerIds: true,
            mangle: false
        });
    </script>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-content">
            <h1><a href="#" onclick="navigateHome(); return false;" class="header-title-link">🍷 Casita Miro</a></h1>
            <p>Marketing POC - Spanish Restaurant + Vineyard | Waiheke Island</p>
        </div>
    </header>
    
    <!-- Breadcrumb -->
    <div class="breadcrumb">
        <div class="breadcrumb-content" id="breadcrumb">
            Marketing Documentation
        </div>
    </div>
    
    <!-- Main Container -->
    <div class="container">
        
        <!-- Home View: Document Library -->
        <div id="homeView">
            <!-- Document Grid -->
            <div class="docs-grid" id="docsGrid">
                <!-- Cards will be generated by JavaScript -->
            </div></div>
        
        <!-- Document Viewer -->
        <div id="docViewer" class="doc-viewer hidden">
            <button class="back-button" onclick="navigateHome()">
                ← Back to Casita Miro Marketing
            </button>
            
            <div class="doc-layout">
                <!-- Sidebar TOC -->
                <div class="sidebar">
                    <div class="toc">
                        <h3>📑 Contents</h3>
                        <div id="toc"></div>
                    </div>
                </div>
                <!-- Content Area -->
                <div class="content-area" id="contentArea"></div>
            </div>
        </div>
        
    </div>
    
    <!-- Footer -->
    <footer style="text-align: center; padding: 3rem 1rem; color: var(--text-secondary); border-top: 1px solid var(--border); margin-top: 4rem;">
        <p><strong>Casita Miro Marketing POC</strong></p>
        <p style="font-size: 0.9rem; margin-top: 0.5rem;">Strategic Documentation Hub • Spanish Restaurant + Vineyard</p>
        <p style="font-size: 0.85rem; margin-top: 0.5rem;">Waiheke Island, New Zealand</p>
        <p style="font-size: 0.8rem; margin-top: 1rem; opacity: 0.6;">Made by Boris the Unicorn 🦄, for Goldhart Digital Services.</p>
    </footer>
    
    <!-- JavaScript -->
    <script src="js/markdown-renderer.js"></script>
</body>
</html>
